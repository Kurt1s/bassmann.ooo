<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bassmann.ooo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --white: #ffffff;
    --black: #000000;
    --link: #0000ee;
    --link-visited: #551a8b;
    --gray: #767676;
    --border: #e5e5e5;
    --serif: "Times New Roman", Times, serif;
    --sans: Arial, Helvetica, sans-serif;
  }
  html { font-size: 16px; }
  body { background: var(--white); color: var(--black); font-family: var(--sans); }

  /* header */
  header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .site-name { font-family: var(--serif); font-style: italic; font-size: 1.4rem; font-weight: normal; text-decoration: none; color: var(--black); }
  nav { display: flex; gap: 20px; align-items: center; font-size: 0.85rem; }
  nav a { color: var(--link); text-decoration: underline; }
  nav a:visited { color: var(--link-visited); }

  /* main */
  main { padding: 16px; }

  /* masonry grid */
  .masonry { columns: 3 280px; column-gap: 16px; }
  @media (max-width: 640px) { .masonry { columns: 2 160px; column-gap: 12px; } }
  @media (max-width: 380px) { .masonry { columns: 1; } }

  /* card */
  .card { break-inside: avoid; margin-bottom: 16px; cursor: pointer; display: block; }
  .card img { width: 100%; display: block; }
  .card:hover img { opacity: 0.9; }
  .card-meta { padding: 4px 0 8px; }
  .card-artist { font-size: 0.8rem; color: var(--link); text-decoration: underline; display: block; }
  .card-title { font-family: var(--serif); font-style: italic; font-size: 0.85rem; color: var(--black); }
  .card-price { font-size: 0.85rem; color: var(--black); display: block; margin-top: 2px; }
  .card-ph { width: 100%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #bbb; font-family: var(--sans); }

  /* lightbox */
  .lb { display: none; position: fixed; inset: 0; z-index: 200; background: var(--white); overflow-y: auto; }
  .lb.open { display: block; }
  .lb-back { position: fixed; top: 12px; left: 16px; background: none; border: none; cursor: pointer; font-size: 0.82rem; color: var(--link); text-decoration: underline; z-index: 210; padding: 4px; font-family: var(--sans); }
  .lb-back:hover { color: var(--link-visited); }
  .lb-body { display: grid; grid-template-columns: 1fr 260px; gap: 40px; padding: 56px 40px 60px; max-width: 1100px; margin: 0 auto; align-items: start; }
  @media (max-width: 700px) { .lb-body { grid-template-columns: 1fr; gap: 16px; padding: 52px 16px 40px; } }
  .lb-img { width: 100%; display: block; }
  .lb-artist { font-size: 0.82rem; color: var(--link); text-decoration: underline; display: block; margin-bottom: 6px; }
  .lb-title { font-family: var(--serif); font-style: italic; font-size: 1rem; color: var(--black); }
  .lb-year { font-size: 1rem; color: var(--black); }
  .lb-medium { font-size: 0.82rem; color: var(--gray); display: block; margin-top: 4px; }
  .lb-dims { font-size: 0.82rem; color: var(--gray); display: block; }
  .lb-price { font-size: 1rem; color: var(--black); display: block; margin: 14px 0 12px; }
  .lb-actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .lb-btn { font-family: var(--sans); font-size: 0.82rem; color: var(--link); text-decoration: underline; background: none; border: none; cursor: pointer; padding: 0; }
  .lb-btn:hover { color: var(--link-visited); }
  .lb-btn-primary { font-family: var(--sans); font-size: 0.82rem; border: 1px solid var(--black); padding: 5px 14px; color: var(--black); background: none; cursor: pointer; text-decoration: none; }
  .lb-btn-primary:hover { background: var(--black); color: var(--white); }

  /* footer */
  footer { border-top: 1px solid var(--border); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 0.78rem; color: var(--gray); }
  footer a { color: var(--link); text-decoration: underline; }
  footer a:visited { color: var(--link-visited); }
</style>
</head>
<body>

<header>
  <a class="site-name" href="/">kurt</a>
  <nav>
    <a href="#work">work</a>
    <a href="office.html">office</a>
    <a href="https://www.artstation.com/kurt1s" target="_blank" rel="noopener">artstation</a>
  </nav>
</header>

<main>
  <div class="masonry" id="work">

    <!--
      HOW TO ADD A PAINTING
      ─────────────────────────────────────────────
      1. Put your image file in this folder
      2. Copy one of the blocks below
      3. Replace the data- attributes with your info
      4. Replace <div class="card-ph" ...> with:
           <img src="yourfile.jpg" alt="Title">
      ─────────────────────────────────────────────
    -->

    <!-- Painting 1 -->
    <div class="card" onclick="openLb(this)"
      data-title="Untitled No. 1"
      data-year="2024"
      data-medium="Oil on linen"
      data-dims="60 × 80 cm"
      data-price="$400">
      <div class="card-ph" style="height:240px">add image</div>
      <div class="card-meta">
        <span class="card-artist">kurt</span>
        <span class="card-title">Untitled No. 1, 2024</span>
        <span class="card-price">$400</span>
      </div>
    </div>

    <!-- Painting 2 -->
    <div class="card" onclick="openLb(this)"
      data-title="Untitled No. 2"
      data-year="2024"
      data-medium="Oil on linen"
      data-dims="50 × 70 cm"
      data-price="$350">
      <div class="card-ph" style="height:310px">add image</div>
      <div class="card-meta">
        <span class="card-artist">kurt</span>
        <span class="card-title">Untitled No. 2, 2024</span>
        <span class="card-price">$350</span>
      </div>
    </div>

    <!-- Painting 3 -->
    <div class="card" onclick="openLb(this)"
      data-title="Untitled No. 3"
      data-year="2023"
      data-medium="Acrylic on canvas"
      data-dims="40 × 50 cm"
      data-price="$280">
      <div class="card-ph" style="height:280px">add image</div>
      <div class="card-meta">
        <span class="card-artist">kurt</span>
        <span class="card-title">Untitled No. 3, 2023</span>
        <span class="card-price">$280</span>
      </div>
    </div>

    <!-- Add more paintings here -->

  </div>
</main>

<footer>
  <span style="font-family:'Times New Roman',Times,serif;font-style:italic;">kurt</span>
  <a href="https://www.artstation.com/kurt1s" target="_blank" rel="noopener">artstation.com/kurt1s</a>
</footer>

<!-- Lightbox -->
<div class="lb" id="lb">
  <button class="lb-back" onclick="closeLb()">← back</button>
  <div class="lb-body">
    <img class="lb-img" id="lb-img" src="" alt="">
    <div class="lb-side">
      <span class="lb-artist">kurt</span>
      <span class="lb-title" id="lb-title"></span><span class="lb-year" id="lb-year"></span>
      <span class="lb-medium" id="lb-medium"></span>
      <span class="lb-dims" id="lb-dims"></span>
      <span class="lb-price" id="lb-price"></span>
      <div class="lb-actions">
        <button class="lb-btn-primary" onclick="inquire()">inquire</button>
        <button class="lb-btn" onclick="sendOffer()">send offer</button>
      </div>
    </div>
  </div>
</div>

<script>
  var currentTitle = '';

  function openLb(card) {
    var img = card.querySelector('img');
    if (!img) return;
    currentTitle = card.dataset.title;
    document.getElementById('lb-img').src = img.src;
    document.getElementById('lb-img').alt = card.dataset.title;
    document.getElementById('lb-title').textContent = card.dataset.title;
    document.getElementById('lb-year').textContent = ', ' + card.dataset.year;
    document.getElementById('lb-medium').textContent = card.dataset.medium;
    document.getElementById('lb-dims').textContent = card.dataset.dims;
    document.getElementById('lb-price').textContent = card.dataset.price;
    document.getElementById('lb').classList.add('open');
    document.body.style.overflow = 'hidden';
    document.getElementById('lb').scrollTop = 0;
  }

  function closeLb() {
    document.getElementById('lb').classList.remove('open');
    document.body.style.overflow = '';
  }

  function inquire() {
    var subject = encodeURIComponent('Inquiry: ' + currentTitle);
    window.location.href = 'mailto:kurt@bassmann.ooo?subject=' + subject;
  }

  function sendOffer() {
    var subject = encodeURIComponent('Offer for: ' + currentTitle);
    window.location.href = 'mailto:kurt@bassmann.ooo?subject=' + subject;
  }

  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLb(); });
</script>

</body>
</html>
